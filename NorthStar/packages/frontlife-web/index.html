<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>点子 (xyzidea) · 共创社区</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ========== Reset & Base ========== */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC',
                     'Microsoft YaHei', 'Segoe UI', sans-serif;
        background: #faf9f6;
        color: #1c1917;
        line-height: 1.6;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ========== Floating Background Orbs ========== */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.35;
        pointer-events: none;
        z-index: 0;
        will-change: transform;
      }

      .orb--green {
        width: 420px;
        height: 420px;
        background: radial-gradient(circle, #a7f3d0 0%, transparent 70%);
        top: -80px;
        left: -100px;
        animation: float-a 18s ease-in-out infinite alternate;
      }

      .orb--orange {
        width: 380px;
        height: 380px;
        background: radial-gradient(circle, #fed7aa 0%, transparent 70%);
        bottom: -60px;
        right: -80px;
        animation: float-b 22s ease-in-out infinite alternate;
      }

      .orb--peach {
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, #fecaca44 0%, transparent 70%);
        top: 50%;
        left: 55%;
        animation: float-c 15s ease-in-out infinite alternate;
      }

      @keyframes float-a {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(60px, 40px) scale(1.08); }
      }
      @keyframes float-b {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-50px, -30px) scale(1.12); }
      }
      @keyframes float-c {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-30px, 20px) scale(0.95); }
      }

      /* ========== Main Layout ========== */
      .page {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px 60px;
      }

      /* ========== Top Badge ========== */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 100px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 600;
        color: #78716c;
        margin-bottom: 36px;
        opacity: 0;
        animation: fade-down 0.6s ease forwards;
        animation-delay: 0s;
      }

      .badge__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #34d399;
        animation: pulse-dot 2s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.5; transform: scale(1.4); }
      }

      @keyframes fade-down {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ========== Chat Container ========== */
      .chat {
        width: 100%;
        max-width: 460px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      /* ========== Chat Row ========== */
      .chat-row {
        display: flex;
        margin-bottom: 14px;
        opacity: 0;
        transform: translateY(16px);
      }

      .chat-row--right {
        justify-content: flex-end;
      }

      .chat-row--left {
        justify-content: flex-start;
      }

      /* ========== Chat Bubbles ========== */
      .bubble {
        max-width: 82%;
        padding: 14px 20px;
        font-size: 16px;
        line-height: 1.55;
        position: relative;
        word-break: break-word;
      }

      .bubble--user {
        background: linear-gradient(135deg, #5eead4, #2dd4bf);
        color: #042f2e;
        border-radius: 20px 20px 6px 20px;
        box-shadow: 0 2px 12px rgba(45, 212, 191, 0.25);
      }

      .bubble--reply {
        background: linear-gradient(135deg, #fdba74, #fb923c);
        color: #431407;
        border-radius: 20px 20px 20px 6px;
        box-shadow: 0 2px 12px rgba(251, 146, 60, 0.25);
        font-weight: 500;
      }

      .bubble--reply .emoji {
        display: inline-block;
        font-style: normal;
        animation: wiggle 1.2s ease-in-out 4.0s 1;
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(0deg); }
        15%      { transform: rotate(14deg); }
        30%      { transform: rotate(-10deg); }
        45%      { transform: rotate(8deg); }
        60%      { transform: rotate(-4deg); }
        75%      { transform: rotate(2deg); }
      }

      .bubble--cta-wrap {
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 20px 20px 20px 6px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        padding: 18px 22px 22px;
      }

      .bubble--cta-wrap .bubble__text {
        font-size: 16px;
        color: #44403c;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      /* ========== Typing Indicator ========== */
      .typing {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 14px 22px;
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 20px 20px 20px 6px;
        opacity: 0;
        transform: translateY(16px);
      }

      .typing__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a8a29e;
        animation: typing-bounce 1.4s ease-in-out infinite;
      }
      .typing__dot:nth-child(2) { animation-delay: 0.15s; }
      .typing__dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes typing-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30%           { transform: translateY(-6px); opacity: 1; }
      }

      /* ========== Animation Sequence ========== */
      /* Step 1: user message at 0.3s */
      .chat-row--msg1 {
        animation: slide-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 0.3s;
      }

      /* Step 2: typing indicator at 1.8s */
      .chat-row--typing .typing {
        animation: slide-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 1.8s;
      }
      .chat-row--typing {
        opacity: 1;
        transform: translateY(0);
      }

      /* Step 3: hide typing, show reply at 3.0s */
      .chat-row--typing .typing {
        animation: slide-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.8s,
                   fade-out 0.25s ease forwards 2.9s;
      }

      .chat-row--msg2 {
        animation: slide-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 3.1s;
      }

      /* Step 4: CTA message at 4.4s */
      .chat-row--msg3 {
        animation: slide-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 4.4s;
      }

      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-out {
        from { opacity: 1; transform: translateY(0); }
        to   { opacity: 0; transform: translateY(-4px); height: 0; margin: 0; padding: 0; overflow: hidden; }
      }

      /* After typing vanishes, collapse its row */
      .chat-row--typing {
        animation: collapse-row 0.01s ease forwards;
        animation-delay: 3.15s;
      }

      @keyframes collapse-row {
        to {
          height: 0;
          margin: 0;
          overflow: hidden;
        }
      }

      /* ========== CTA Button ========== */
      .cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #f97316, #fb923c);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3);
        letter-spacing: 0.02em;
      }

      .cta-btn:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 6px 24px rgba(249, 115, 22, 0.4);
      }

      .cta-btn:active {
        transform: translateY(0) scale(0.98);
      }

      .cta-btn__arrow {
        display: inline-block;
        transition: transform 0.2s ease;
        font-size: 17px;
      }

      .cta-btn:hover .cta-btn__arrow {
        transform: translateX(3px);
      }

      /* ========== Footer / Brand ========== */
      .footer {
        margin-top: 52px;
        text-align: center;
        opacity: 0;
        animation: fade-down 0.6s ease forwards;
        animation-delay: 5.2s;
      }

      .footer__brand {
        font-family: 'Outfit', sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #d6d3d1;
        user-select: none;
      }

      .footer__sub {
        font-size: 12px;
        color: #c4b9af;
        margin-top: 4px;
        letter-spacing: 0.06em;
      }

      /* ========== Custom Scrollbar ========== */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

      /* ========== Responsive ========== */
      @media (max-width: 520px) {
        .page {
          padding: 28px 16px 48px;
        }
        .chat {
          max-width: 100%;
        }
        .bubble {
          max-width: 88%;
          padding: 12px 16px;
          font-size: 15px;
        }
        .bubble--cta-wrap {
          padding: 14px 16px 18px;
        }
        .cta-btn {
          padding: 12px 22px;
          font-size: 14px;
          width: 100%;
          justify-content: center;
        }
        .badge {
          font-size: 12px;
          margin-bottom: 28px;
        }
        .orb--green { width: 280px; height: 280px; }
        .orb--orange { width: 240px; height: 240px; }
        .orb--peach { width: 160px; height: 160px; }
      }

      @media (min-width: 768px) {
        .chat {
          max-width: 500px;
        }
      }

      /* ========== Prefers reduced motion ========== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-delay: 0ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .chat-row,
        .typing,
        .badge,
        .footer {
          opacity: 1 !important;
          transform: none !important;
        }
        .orb { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <!-- Floating background orbs -->
    <div class="orb orb--green" aria-hidden="true"></div>
    <div class="orb orb--orange" aria-hidden="true"></div>
    <div class="orb orb--peach" aria-hidden="true"></div>

    <div id="root">
      <main class="page" aria-label="点子 共创社区">

        <!-- Status badge -->
        <div class="badge">
          <span class="badge__dot" aria-hidden="true"></span>
          共创社区 · 点子酝酿中
        </div>

        <!-- Chat conversation -->
        <div class="chat" role="log" aria-label="模拟对话">

          <!-- Message 1: User -->
          <div class="chat-row chat-row--right chat-row--msg1">
            <div class="bubble bubble--user" aria-label="用户说">
              我有个点子……
            </div>
          </div>

          <!-- Typing indicator -->
          <div class="chat-row chat-row--left chat-row--typing" aria-hidden="true">
            <div class="typing">
              <span class="typing__dot"></span>
              <span class="typing__dot"></span>
              <span class="typing__dot"></span>
            </div>
          </div>

          <!-- Message 2: Reply -->
          <div class="chat-row chat-row--left chat-row--msg2">
            <div class="bubble bubble--reply" aria-label="回复说">
              哟，你点子真多啊 <span class="emoji" aria-hidden="true">😏</span>
            </div>
          </div>

          <!-- Message 3: CTA -->
          <div class="chat-row chat-row--left chat-row--msg3">
            <div class="bubble bubble--cta-wrap">
              <div class="bubble__text">我们叫它“点子” —— 来看看到底有些什么好想法？</div>
              <a class="cta-btn" href="https://iwalk.pro" target="_blank" rel="noopener noreferrer">
                先去博客看看
                <span class="cta-btn__arrow" aria-hidden="true">→</span>
              </a>
            </div>
          </div>

        </div>

        <!-- Footer brand -->
        <footer class="footer">
          <div class="footer__brand">点子 (xyzidea)</div>
          <div class="footer__sub">where ideas land</div>
        </footer>

      </main>
    </div>

    <!-- <script type="module" src="/src/main.tsx"></script> -->
  </body>
</html>
