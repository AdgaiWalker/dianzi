<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>点子 (xyzidea) · AI 工具站</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ========== Reset & Core Styles ========== */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
        background: #07090e;
        color: #f8fafc;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* ========== Particle Canvas ========== */
      #particles-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* ========== Background Glows ========== */
      .glow-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
        will-change: transform;
      }

      .glow-orb--cyan {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
        top: -150px;
        left: -100px;
        animation: float-cyan 20s ease-in-out infinite alternate;
      }

      .glow-orb--purple {
        width: 450px;
        height: 450px;
        background: radial-gradient(circle, #a855f7 0%, transparent 70%);
        bottom: -150px;
        right: -100px;
        animation: float-purple 25s ease-in-out infinite alternate;
      }

      @keyframes float-cyan {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(80px, 50px) scale(1.1); }
      }

      @keyframes float-purple {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-80px, -50px) scale(1.15); }
      }

      /* ========== Layout ========== */
      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 600px;
        padding: 40px 24px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      /* ========== Status Tag ========== */
      .status-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 100px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 500;
        color: #94a3b8;
        letter-spacing: 0.05em;
        margin-bottom: 32px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.1s;
      }

      .status-tag__dot {
        width: 6px;
        height: 6px;
        background-color: #06b6d4;
        border-radius: 50%;
        box-shadow: 0 0 10px #06b6d4;
        animation: pulse-dot 2s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.5; }
      }

      /* ========== Brand & Wordplay ========== */
      .brand-title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: clamp(48px, 10vw, 76px);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #22d3ee 0%, #a855f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.2s;
        will-change: transform, opacity;
      }

      .brand-tagline {
        font-size: clamp(20px, 4.5vw, 24px);
        font-weight: 600;
        color: #e2e8f0;
        letter-spacing: 0.1em;
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.35s;
      }

      .brand-narrative {
        font-size: 15px;
        color: #64748b;
        line-height: 1.7;
        max-width: 440px;
        margin-bottom: 40px;
        opacity: 0;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.5s;
      }

      .brand-narrative strong {
        color: #94a3b8;
        font-weight: 600;
      }

      /* ========== CTA Button ========== */
      .cta-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 15px 36px;
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        overflow: hidden;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        opacity: 0;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.65s;
        cursor: pointer;
      }

      /* Neon border glow on hover */
      .cta-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #06b6d4, #a855f7);
        opacity: 0;
        z-index: -1;
        transition: opacity 0.3s ease;
      }

      .cta-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 25px rgba(34, 211, 238, 0.3), 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .cta-btn:hover::before {
        opacity: 0.08;
      }

      .cta-btn:active {
        transform: translateY(0);
      }

      .cta-btn__arrow {
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        font-size: 16px;
        color: #22d3ee;
      }

      .cta-btn:hover .cta-btn__arrow {
        transform: translateX(4px);
        color: #ffffff;
      }

      /* ========== Animations ========== */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ========== Footer / Subtext ========== */
      .footer {
        position: absolute;
        bottom: 24px;
        font-size: 11px;
        color: #334155;
        letter-spacing: 0.1em;
        font-family: 'Outfit', sans-serif;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 1s;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* ========== Custom Scrollbar ========== */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      /* ========== Responsive ========== */
      @media (max-width: 480px) {
        .container {
          padding: 32px 16px;
        }
        .status-tag {
          font-size: 12px;
          margin-bottom: 24px;
          padding: 6px 14px;
        }
        .brand-narrative {
          font-size: 14px;
          margin-bottom: 32px;
        }
        .cta-btn {
          width: 100%;
          justify-content: center;
          padding: 14px 28px;
        }
      }

      /* ========== Reduced Motion ========== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-delay: 0ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .status-tag,
        .brand-title,
        .brand-tagline,
        .brand-narrative,
        .cta-btn,
        .footer {
          opacity: 1 !important;
          transform: none !important;
        }
        .glow-orb { animation: none !important; }
        #particles-canvas { display: none; }
      }
    </style>
  </head>
  <body>
    <!-- Canvas for Particle Network -->
    <canvas id="particles-canvas"></canvas>

    <!-- Background decorative glows -->
    <div class="glow-orb glow-orb--cyan" aria-hidden="true"></div>
    <div class="glow-orb glow-orb--purple" aria-hidden="true"></div>

    <div id="root">
      <main class="container" aria-label="点子 AI 工具站">
        <!-- Status -->
        <div class="status-tag">
          <span class="status-tag__dot" aria-hidden="true"></span>
          AI 工具站 · 点子 (xyzidea) 正在生长
        </div>

        <!-- Brand Name -->
        <h1 class="brand-title">点子</h1>

        <!-- Tagline -->
        <p class="brand-tagline">有点子，就试试</p>

        <!-- Description with Wordplay -->
        <p class="brand-narrative">
          在未知的 <strong>xyz</strong> 里，藏着无限个未落地的 <strong>idea</strong>。<br/>
          我们给它取名叫 <strong>点子</strong>，正在编写代码让它发芽。
        </p>

        <!-- CTA Button -->
        <a class="cta-btn" href="https://iwalk.pro" target="_blank" rel="noopener noreferrer">
          <span>去看已知的</span>
          <span class="cta-btn__arrow" aria-hidden="true">→</span>
        </a>

        <!-- Footer -->
        <footer class="footer">
          © 2026 点子 (xyzidea.com) · where ideas grow
        </footer>
      </main>
    </div>

    <!-- Particle System Script -->
    <script>
      (function() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let particles = [];
        const isMobile = width < 768;
        const particleCount = isMobile ? 35 : 85;
        const connectionDistance = isMobile ? 85 : 125;
        
        // Handle Resize
        window.addEventListener('resize', function() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        });
        
        // Particle Class
        class Particle {
          constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            // Very slow, floating motion
            this.vx = (Math.random() - 0.5) * 0.25;
            this.vy = (Math.random() - 0.5) * 0.25;
            this.radius = Math.random() * 1.5 + 0.5;
            // Brightness factor for organic twinkling
            this.pulseSpeed = 0.005 + Math.random() * 0.01;
            this.pulseTime = Math.random() * Math.PI;
          }
          
          update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Boundary checks
            if (this.x < 0 || this.x > width) this.vx = -this.vx;
            if (this.y < 0 || this.y > height) this.vy = -this.vy;
            
            this.pulseTime += this.pulseSpeed;
          }
          
          draw() {
            const alpha = 0.3 + Math.sin(this.pulseTime) * 0.2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(34, 211, 238, ${alpha})`; // Cyan accent
            ctx.fill();
          }
        }
        
        // Init Particles
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }
        
        // Connect Particles with lines representing connections of ideas
        function connectParticles() {
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              if (dist < connectionDistance) {
                // Closer particles get more solid lines
                const alpha = (1 - (dist / connectionDistance)) * 0.12;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                
                // Beautiful gradient line cyan to purple
                const grad = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                grad.addColorStop(0, `rgba(34, 211, 238, ${alpha})`); // Cyan
                grad.addColorStop(1, `rgba(168, 85, 247, ${alpha})`); // Purple
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 0.8;
                ctx.stroke();
              }
            }
          }
        }
        
        // Animation Loop
        function animate() {
          ctx.clearRect(0, 0, width, height);
          
          for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
          }
          
          connectParticles();
          requestAnimationFrame(animate);
        }
        
        animate();
      })();
    </script>

  </body>
</html>
